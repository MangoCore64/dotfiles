# --- 載入環境變數 (重要!) ---
source = ~/.config/hypr/env.conf

# --- 螢幕配置 (Monitor Configuration) ---
monitor = desc:Acer Technologies XV272U KV, 2560x1440@144, 0x0, 1.25, vrr, 0
monitor = desc:christmann informationstechnik + medien GmbH & Co. KG CH7218, 1920x1080@60, 2048x0, 1
monitor = HDMI-A-1, 1920x1080@120, 9999x0, 1
monitor = , preferred, auto, 1

# --- 自動啟動項目 (Exec-once) ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = hyprpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = waybar
exec-once = nm-applet
exec-once = swayosd-server
exec-once = wl-gammarelay-rs
exec-once = hypridle
exec-once = fcitx5 -d  --replace
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = udiskie &
exec-once = env -u WAYLAND_DISPLAY sunshine
exec-once = [workspace special:scratchpad silent] alacritty --class scratchpad
exec-once = vivaldi
exec-once = steam -silent

# --- 輸入設定 ---
input {
    kb_layout = us
    repeat_rate = 50           # 每秒重複次數（預設 25）
    repeat_delay = 300         # 首次重複延遲 ms（預設 600）
    follow_mouse = 1

    sensitivity = 0            # 不加速也不減速（-1.0 ~ 1.0）
    accel_profile = flat       # 原始輸入，無加速曲線
}

xwayland {
    force_zero_scaling = true
}

# --- 佈局設定 (Dwindle) ---
general {
    layout = dwindle
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    allow_tearing = true 
}

dwindle {
    pseudotile = yes 
    preserve_split = yes 
}

# --- 雜項與渲染優化 (Misc & Render) ---
misc {
    vfr = true                 # 靜止畫面降頻，節省 GPU 功耗
    vrr = 1                    # 啟用 VRR（配合 monitor line 的 vrr,0 = fullscreen-only）
    focus_on_activate = true   # 應用程式要求焦點時自動切換
}

render {
    direct_scanout = false     # 全螢幕應用繞過合成器 (若副螢幕閃爍請關閉)
}

# --- 裝飾 (Decoration) ---
decoration {
    rounding = 10
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# --- 動畫 (Animations) ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- 工作區綁定 (Workspace) ---
workspace = 1, monitor:DP-3, default:yes
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
workspace = 6, monitor:DP-2, default:yes
workspace = 7, monitor:HDMI-A-1, default:yes

# --- 按鍵綁定 ($mainMod = Super/Win 鍵) ---
$mainMod = SUPER

bind = $mainMod, Q, exec, alacritty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, exec, wlogout

# 滑鼠綁定 (移動與縮放)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# 切換工作區
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7

# 移動視窗到工作區
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7

# 視窗焦點切換
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# 系統管理
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod, Tab, focusmonitor, l
bind = $mainMod SHIFT, Tab, focusmonitor, r

# 串流控制 (Sunshine + Moonlight)
bind = $mainMod SHIFT, S, exec, /home/mango/.config/sunshine/scripts/switch_to_dummy.sh
bind = $mainMod SHIFT, R, exec, /home/mango/.config/sunshine/scripts/restore_main.sh

# --- 80% 鍵盤媒體鍵對照表 (Fn + F1-F12) ---
# F1:  XF86MonBrightnessDown (螢幕亮度 -)
# F2:  XF86MonBrightnessUp   (螢幕亮度 +)
# F3:  XF86LaunchA           (未定義)
# F4:  XF86LaunchB           (未定義)
# F5:  XF86KbdBrightnessDown (鍵盤背光 -)
# F6:  XF86KbdBrightnessUp   (鍵盤背光 +)
# F7:  XF86AudioPrev         (上一首)
# F8:  XF86AudioPlay         (播放/暫停)
# F9:  XF86AudioNext         (下一首)
# F10: XF86AudioMute         (靜音)
# F11: XF86AudioLowerVolume  (音量 -)
# F12: XF86AudioRaiseVolume  (音量 +)

# --- 音量/亮度 控制 (SwayOSD & wl-gammarelay-rs) ---
# 音量控制 (加上 Locked 修飾以在鎖屏下生效)
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower

# 媒體控制 (需安裝 playerctl)
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

# 螢幕亮度控制 (正確的 wl-gammarelay-rs 官方語法 + SwayOSD)
bindle = , XF86MonBrightnessUp, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d 0.05 && swayosd-client --brightness +5
bindle = , XF86MonBrightnessDown, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d -0.05 && swayosd-client --brightness -5

# 鍵盤背光控制 (如果硬體支援)
bindle = , XF86KbdBrightnessUp, exec, swayosd-client --input-device-brightness +10
bindle = , XF86KbdBrightnessDown, exec, swayosd-client --input-device-brightness -10

# --- 截圖快捷鍵 (grimblast + swappy) ---
bind = , Print, exec, grimblast --notify copy screen              # 全螢幕 → 剪貼簿
bind = SHIFT, Print, exec, grimblast --notify copy area           # 區域選取 → 剪貼簿
bind = $mainMod, Print, exec, grimblast --notify edit area        # 區域選取 → swappy 編輯
bind = $mainMod SHIFT, Print, exec, grimblast --notify copysave area  # 區域選取 → 剪貼簿+存檔

# --- 剪貼簿歷史 (cliphist + rofi) ---
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

# --- 移動窗口位置 ---
# 方向鍵
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
# Vim 風格
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- 窗口跨螢幕移動 ---
bind = $mainMod CTRL, left, movewindow, mon:l
bind = $mainMod CTRL, right, movewindow, mon:r

# --- Scratchpad（特殊工作區）---
bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratchpad

# --- Resize 模式 (Super+R 進入，Escape/Enter 退出) ---
bind = $mainMod, R, submap, resize

submap = resize
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
binde = , l, resizeactive, 30 0
binde = , h, resizeactive, -30 0
binde = , k, resizeactive, 0 -30
binde = , j, resizeactive, 0 30
bind = , escape, submap, reset
bind = , Return, submap, reset
submap = reset

# --- Layer Rules (blur 效果) ---
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.3, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.3, match:namespace notifications

# --- 視窗規則 (最新 Window Rule 語法) ---

# 1. 遊戲與立即渲染 (Tearing)
windowrule = match:class ^(steam_app_.*)$, immediate on
windowrule = match:class ^(cs2)$, immediate on

# 2. 浮動視窗規則 (0.53+ 嚴格語法: 需明確指定 'match:' 與 'on')
windowrule = match:class ^(pavucontrol)$, float on, center on
windowrule = match:class ^(nm-connection-editor)$, float on, center on
windowrule = match:class ^(org.kde.dolphin)$ && match:title ^(Copying — Dolphin)$, float on, center on
windowrule = match:title ^(Open File)$, float on, center on
windowrule = match:title ^(branchdialog)$, float on, center on
windowrule = match:title ^(Confirm to replace files)$, float on, center on
windowrule = match:title ^(File Operation Progress)$, float on, center on
windowrule = match:title ^(Picture-in-Picture)$, float on, center on

# 針對瀏覽器擴充功能 (Bitwarden 等) 強制浮動 - 使用寬鬆匹配
windowrule = match:title .*Bitwarden.*, float on, center on
windowrule = match:title .*Extension.*, float on, center on
windowrule = match:title .*Sharing Indicator.*, float on, center on

# Scratchpad 窗口樣式
windowrule = match:class ^(scratchpad)$, float on, size 80% 70%, center on

# 讓所有浮動視窗置中 (使用 match:float)
windowrule = match:float 1, center on

# 3. 智慧間隙 (Smart Gaps)
# 注意: 如果您的版本支援 w[t1] 選擇器，這是在 workspace rule 中設定
workspace = w[t1], gapsout:0, gapsin:0
workspace = w[tg1], gapsout:0, gapsin:0

# 4. 工作區分配 (Startup Apps - 使用 0.53 最新語法)
windowrule = match:class ^(vivaldi-stable)$, workspace 2
#windowrule = match:class ^(steam)$, workspace 3
windowrule = match:class ^(steam_app_.*)$, workspace 3
# windowrule = match:class ^(Spotify)$, workspace 4
